<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="printerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#f5f2ea"/>
  
  <!-- Printer body -->
  <rect x="35" y="100" width="110" height="85" rx="6" fill="url(#printerGradient)"/>
  
  <!-- Printer top paper slot -->
  <rect x="45" y="95" width="90" height="12" rx="2" fill="#0052cc"/>
  
  <!-- Printer paper output -->
  <rect x="50" y="75" width="80" height="8" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <line x1="50" y1="80" x2="130" y2="80" stroke="#ddd" stroke-width="1"/>
  
  <!-- Printer buttons/controls -->
  <circle cx="55" cy="135" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="70" cy="135" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="85" cy="135" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="100" cy="135" r="3" fill="#fff" opacity="0.7"/>
  
  <!-- Document/Image floating to the right -->
  <g transform="translate(95, 65)">
    <rect x="0" y="0" width="75" height="95" rx="4" fill="url(#docGradient)" stroke="#999" stroke-width="1.5"/>
    <!-- Image inside document -->
    <rect x="8" y="8" width="59" height="40" fill="#e0f4ff"/>
    <circle cx="25" cy="22" r="6" fill="#ff6b6b"/>
    <polygon points="45,28 60,48 45,48" fill="#4ecdc4"/>
    <!-- Lines simulating text -->
    <line x1="8" y1="55" x2="67" y2="55" stroke="#ccc" stroke-width="1.5"/>
    <line x1="8" y1="62" x2="67" y2="62" stroke="#ccc" stroke-width="1"/>
    <line x1="8" y1="68" x2="50" y2="68" stroke="#ccc" stroke-width="1"/>
  </g>
  
  <!-- Magnifying glass -->
  <g transform="translate(145, 155)">
    <!-- Lens circle -->
    <circle cx="20" cy="20" r="22" fill="none" stroke="#06667a" stroke-width="4"/>
    <!-- Glass shine -->
    <circle cx="12" cy="12" r="8" fill="#fff" opacity="0.3"/>
    <!-- Handle -->
    <line x1="38" y1="38" x2="55" y2="55" stroke="#06667a" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
