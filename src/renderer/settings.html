<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - PrintaView</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        background: var(--bg);
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .settings-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }
      .settings-section {
        margin-bottom: 24px;
      }
      .settings-section-title {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
      }
      .settings-subheading {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 8px;
      }
      .settings-item {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
        padding: 8px 0;
      }
      .settings-item label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        flex: 1;
      }
      .settings-item input[type="checkbox"],
      .settings-item input[type="radio"] {
        cursor: pointer;
      }
      .theme-options {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .theme-option {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        cursor: pointer;
      }
      .theme-option:hover {
        border-color: var(--accent);
      }
      .theme-option input {
        margin: 0;
      }
      .theme-label {
        flex: 1;
      }
      .theme-swatch {
        width: 42px;
        height: 20px;
        border-radius: 999px;
        border: 1px solid rgba(0, 0, 0, 0.16);
      }
      .theme-swatch.default {
        background: linear-gradient(160deg, #ece5d4 0%, #e4dcc8 100%);
      }
      .theme-swatch.pastel-pink {
        background: linear-gradient(160deg, #f7e5ee 0%, #efd6e2 100%);
      }
      .theme-swatch.baby-blue {
        background: linear-gradient(160deg, #e6f0fb 0%, #d8e5f4 100%);
      }
      .pane-position-toggle {
        display: flex;
        gap: 8px;
      }
      .pane-position-toggle button {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 100ms ease;
      }
      .pane-position-toggle button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }
      .pane-position-toggle button:hover {
        border-color: var(--accent);
      }
      #hidden-items-list {
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        background: var(--surface);
        font-size: 0.85rem;
        margin-bottom: 10px;
      }
      .hidden-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px;
        border-bottom: 1px solid var(--line);
      }
      .hidden-item:last-child {
        border-bottom: none;
      }
      .hidden-item span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .hidden-item button {
        margin-left: 8px;
        padding: 2px 8px;
        font-size: 0.75rem;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 3px;
        cursor: pointer;
        color: var(--ink);
      }
      .hidden-item button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .hidden-none {
        color: var(--ink-soft);
        padding: 12px;
        text-align: center;
        font-size: 0.85rem;
      }
      #clear-all-hidden {
        width: 100%;
        padding: 8px 12px;
        margin-top: 8px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--ink);
        cursor: pointer;
        font-size: 0.9rem;
      }
      #clear-all-hidden:hover {
        border-color: var(--accent);
        background: rgba(6, 102, 122, 0.08);
      }
      .settings-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--line);
      }
      .settings-buttons button {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 100ms ease;
      }
      .settings-buttons #save-btn {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .settings-buttons #save-btn:hover {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
      }
      .settings-buttons #cancel-btn {
        background: var(--surface);
        color: var(--ink);
      }
      .settings-buttons #cancel-btn:hover {
        border-color: var(--accent);
        background: rgba(6, 102, 122, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="settings-container">
      <div class="settings-section">
        <div class="settings-section-title">Display</div>
        <div class="settings-item">
          <div class="theme-options" role="radiogroup" aria-label="Theme">
            <label class="theme-option">
              <input type="radio" name="theme" value="default" checked />
              <span class="theme-label">Default</span>
              <span class="theme-swatch default" aria-hidden="true"></span>
            </label>
            <label class="theme-option">
              <input type="radio" name="theme" value="pastel-pink" />
              <span class="theme-label">Pastel Pink</span>
              <span class="theme-swatch pastel-pink" aria-hidden="true"></span>
            </label>
            <label class="theme-option">
              <input type="radio" name="theme" value="baby-blue" />
              <span class="theme-label">Baby Blue</span>
              <span class="theme-swatch baby-blue" aria-hidden="true"></span>
            </label>
          </div>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Details Pane</div>
        <div class="settings-item">
          <label>
            <input id="show-details-pane" type="checkbox" checked />
            Show Details Pane
          </label>
        </div>
        <div class="settings-subheading">Position</div>
        <div class="pane-position-toggle">
          <button id="pane-left-btn" class="active">← Left</button>
          <button id="pane-right-btn">Right →</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Hidden Items</div>
        <div class="settings-item">
          <label>
            <input id="show-hidden" type="checkbox" />
            Show Hidden Files
          </label>
        </div>
        <div id="hidden-items-list"></div>
        <button id="clear-all-hidden" type="button">Clear All Hidden Items</button>
      </div>

      <div class="settings-buttons">
        <button id="cancel-btn" type="button">Cancel</button>
        <button id="save-btn" type="button">Save</button>
      </div>
    </div>

    <script src="./settings.js"></script>
  </body>
</html>
