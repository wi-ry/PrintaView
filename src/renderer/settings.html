<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - PrintaView</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        background: var(--bg);
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .settings-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }
      .settings-section {
        margin-bottom: 24px;
      }
      .settings-section-title {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
      }
      .settings-item {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
        padding: 8px 0;
      }
      .settings-item label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        flex: 1;
      }
      .settings-item input[type="checkbox"],
      .settings-item input[type="radio"] {
        cursor: pointer;
      }
      .pane-position-toggle {
        display: flex;
        gap: 8px;
      }
      .pane-position-toggle button {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 100ms ease;
      }
      .pane-position-toggle button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }
      .pane-position-toggle button:hover {
        border-color: var(--accent);
      }
      #hidden-items-list {
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px;
        background: var(--surface);
        font-size: 0.85rem;
        margin-bottom: 10px;
      }
      .hidden-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px;
        border-bottom: 1px solid var(--line);
      }
      .hidden-item:last-child {
        border-bottom: none;
      }
      .hidden-item span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      .hidden-item button {
        margin-left: 8px;
        padding: 2px 8px;
        font-size: 0.75rem;
        background: transparent;
        border: 1px solid var(--line);
        border-radius: 3px;
        cursor: pointer;
        color: var(--ink);
      }
      .hidden-item button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .hidden-none {
        color: var(--ink-soft);
        padding: 12px;
        text-align: center;
        font-size: 0.85rem;
      }
      #clear-all-hidden {
        width: 100%;
        padding: 8px 12px;
        margin-top: 8px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--ink);
        cursor: pointer;
        font-size: 0.9rem;
      }
      #clear-all-hidden:hover {
        border-color: var(--accent);
        background: rgba(6, 102, 122, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="settings-container">
      <div class="settings-section">
        <div class="settings-section-title">Display</div>
        <div class="settings-item">
          <label>
            <input id="show-details-pane" type="checkbox" checked />
            Show Details Pane
          </label>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Details Pane Position</div>
        <div class="pane-position-toggle">
          <button id="pane-left-btn" class="active">← Left</button>
          <button id="pane-right-btn">Right →</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-item">
          <label>
            <input id="show-hidden" type="checkbox" />
            Show Hidden Files
          </label>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Hidden Items</div>
        <div id="hidden-items-list"></div>
        <button id="clear-all-hidden" type="button">Clear All Hidden Items</button>
      </div>
    </div>

    <script src="./settings.js"></script>
  </body>
</html>
